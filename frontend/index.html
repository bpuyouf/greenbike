<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenBike</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app">
    <header class="header">
      <div class="header__inner">
        <h1 class="header__title">GreenBike</h1>
        <p class="header__subtitle">Manage products stored in the database.</p>
      </div>
    </header>

    <main class="main">
      <section class="section section--form">
        <h2 class="section__title">Add a Product</h2>
        <form class="form" id="productForm">
          <label class="form__label" for="productName">Name</label>
          <input
            class="form__input"
            id="productName"
            name="name"
            type="text"
            placeholder="e.g. Urban Bike"
            required
          />

          <label class="form__label" for="productCategory">Category</label>
          <input
            class="form__input"
            id="productCategory"
            name="category"
            type="number"
            placeholder="e.g. 1"
            required
          />

          <label class="form__label" for="productPrice">Price</label>
          <input
            class="form__input"
            id="productPrice"
            name="price"
            type="number"
            step="0.01"
            placeholder="e.g. 199.99"
            required
          />

          <label class="form__label" for="productDescription">Description</label>
          <textarea
            class="form__input"
            id="productDescription"
            name="description"
            placeholder="Optional description"
            rows="3"
          ></textarea>

          <button class="button" type="submit">Add product</button>
        </form>
      </section>

      <section class="section section--list">
        <h2 class="section__title">Products</h2>
        <ul class="product-list" id="productList">
          <li class="product-list__item">Loading…</li>
        </ul>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">Built for a simple GreenBike demo.</p>
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
